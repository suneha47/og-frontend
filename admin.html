<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — OG Accessories 47</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0a0a0a;--dark:#141414;--card:#1c1c1c;--border:#2a2a2a;--gold:#c9a84c;--gold2:#e8c97a;--goldg:linear-gradient(135deg,#9a7635,#c9a84c,#e8c97a);--white:#f0f0f0;--muted:#777;--red:#e74c3c}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
    nav{background:var(--dark);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
    .nav-logo{font-size:1.2rem;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.12em}
    .back-link{color:var(--muted);text-decoration:none;font-size:.82rem;font-weight:600;transition:color .2s}
    .back-link:hover{color:var(--gold)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .login-box{background:var(--dark);border:1px solid var(--border);padding:40px;width:100%;max-width:400px}
    .login-brand{font-size:1.6rem;font-weight:700;color:var(--gold);letter-spacing:.12em;margin-bottom:4px}
    .login-sub{color:var(--muted);font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px}
    .err{background:rgba(231,76,60,.1);border-left:3px solid var(--red);color:var(--red);font-size:.8rem;padding:10px 14px;margin-bottom:16px;display:none}
    .err.show{display:block}
    .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
    .fg label{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
    .fg input{background:var(--card);border:1px solid var(--border);color:var(--white);font-family:inherit;font-size:.9rem;padding:12px 14px;outline:none;transition:border-color .2s}
    .fg input:focus{border-color:var(--gold)}
    .login-btn{width:100%;background:var(--goldg);color:var(--black);font-family:inherit;font-weight:700;font-size:.85rem;letter-spacing:.18em;text-transform:uppercase;padding:14px;border:none;cursor:pointer;margin-top:8px;transition:filter .2s}
    .login-btn:hover{filter:brightness(1.1)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed}
    .store-link{text-align:center;margin-top:20px}
    .store-link a{color:var(--muted);text-decoration:none;font-size:.78rem;transition:color .2s}
    .store-link a:hover{color:var(--gold)}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">OG 47 — Admin</a>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
</nav>
<main>
  <div class="login-box">
    <div class="login-brand">OG Accessories 47</div>
    <div class="login-sub">Admin Panel</div>
    <div class="err" id="errorMsg"></div>
    <div class="fg">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@ogaccessories47.com"/>
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="store-link"><a href="index.html">← Return to Store</a></div>
  </div>
</main>
<script>
  const API = 'https://og-backend-2-pytg.onrender.com';
  if(localStorage.getItem('og47_token')) window.location.href = 'dashboard.html';
  async function login(){
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    if(!email||!password){ err.textContent='Please enter email and password.'; err.classList.add('show'); return; }
    btn.textContent='Signing in...'; btn.disabled=true; err.classList.remove('show');
    try{
      const res = await fetch(`${API}/api/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data = await res.json();
      if(!res.ok) throw new Error(data.message||'Login failed');
      localStorage.setItem('og47_token',data.token);
      window.location.href='dashboard.html';
    }catch(e){
      err.textContent = e.message||'Login failed. Check credentials.';
      err.classList.add('show');
      btn.textContent='Sign In'; btn.disabled=false;
    }
  }
</script>
</body>
</html>
